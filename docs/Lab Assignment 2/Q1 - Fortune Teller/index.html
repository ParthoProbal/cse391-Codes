<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pageWrapper">
        <main class="mainContent">
            <div class="generatorContainer">
                
                
                <div class="fortuneDisplayArea">
                    <div id = "fortuneHeaderID">
                        <h2 class="fortuneHeaderClass">Fortune : Loading...</h2>
                    </div>
                    
                    
                    <div id="fourtuneBoxId" class="fortuneBoxClass">
                        <p id="fortuneText">Wisdom begins with a single click</p>
                    </div>
                </div>

                <div class="controls">
                    <button class="controlButton" dataStyle="textColor">Font Color</button>
                    <button class="controlButton" dataStyle="bgColor">Background</button>
                    <button class="controlButton" dataStyle="borderColor">Border</button>
                    <button class="controlButton" dataStyle="fontStyle">Size & Family</button>
                </div>

            </div>
        </main>

        <footer class="pageFooter">
            <p>True wisdom comes not from knowledge, but from understanding.</p>
        </footer>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
